# Disable Streamlit's source watcher. It otherwise tries to introspect every
# imported module (including transformers' optional submodules), which spews
# long, harmless tracebacks about modules like torchvision that aren't installed.
# Turning it off also means the app won't auto-reload on code edits — fine for a
# finished, double-click app (just relaunch run.command after editing the code).
[server]
fileWatcherType = "none"

[browser]
gatherUsageStats = false
